name: Build And Release

on:
  push:
    branches:
      - main
      - hardening/**
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
          - arch: x86
            cmake_arch: Win32
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure (${{ matrix.arch }})
        run: >
          cmake -S src/uhf_wrapper -B build-${{ matrix.arch }}
          -G "Visual Studio 17 2022"
          -A ${{ matrix.cmake_arch }}
          -DUHF_MINIMAL_EXPORTS_ONLY=ON

      - name: Build (${{ matrix.arch }})
        run: cmake --build build-${{ matrix.arch }} --config Release

      - name: Smoke Test CLI (${{ matrix.arch }})
        shell: pwsh
        run: |
          & ".\build-${{ matrix.arch }}\Release\UhfWrapperCli.exe" --help | Out-Null

      - name: Package (${{ matrix.arch }})
        shell: pwsh
        run: |
          $outDir = "dist/${{ matrix.arch }}"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          Copy-Item "build-${{ matrix.arch }}/Release/UhfWrapper.dll" "$outDir/" -Force
          Copy-Item "build-${{ matrix.arch }}/Release/UhfWrapperCli.exe" "$outDir/" -Force
          Copy-Item "README.md" "$outDir/" -Force
          Copy-Item "LICENSE" "$outDir/" -Force
          Compress-Archive -Path "$outDir/*" -DestinationPath "dist/UhfWrapper-${{ matrix.arch }}.zip" -Force

      - name: Verify Package Content (${{ matrix.arch }})
        shell: pwsh
        run: |
          $zipPath = "dist/UhfWrapper-${{ matrix.arch }}.zip"
          $tmpDir = Join-Path $env:RUNNER_TEMP "pkg-${{ matrix.arch }}"
          if (Test-Path $tmpDir) { Remove-Item -Recurse -Force $tmpDir }
          Expand-Archive -Path $zipPath -DestinationPath $tmpDir -Force
          $forbidden = Get-ChildItem -Path $tmpDir -Recurse -Filter "SWHidApi.dll" -ErrorAction SilentlyContinue
          if ($forbidden) {
            throw "Forbidden vendor binary found in package: SWHidApi.dll"
          }
          foreach ($required in @("UhfWrapper.dll", "UhfWrapperCli.exe", "README.md", "LICENSE")) {
            if (-not (Test-Path (Join-Path $tmpDir $required))) {
              throw "Missing required artifact file: $required"
            }
          }

      - name: Upload Artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-${{ matrix.arch }}
          path: dist/UhfWrapper-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: package-*
          merge-multiple: true
          path: release-assets

      - name: Generate SHA256 Checksums
        run: |
          sha256sum release-assets/UhfWrapper-x64.zip > release-assets/SHA256SUMS.txt
          sha256sum release-assets/UhfWrapper-x86.zip >> release-assets/SHA256SUMS.txt

      - name: Publish GitHub Release Assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: |
            release-assets/UhfWrapper-x64.zip
            release-assets/UhfWrapper-x86.zip
            release-assets/SHA256SUMS.txt
          generate_release_notes: true
